name: checks

on:
  push:
    branches: [master]
  pull_request:

jobs:
  skill-descriptions:
    name: SKILL.md descriptions are single-line scalars
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # Dependency-free checker — no install step needed.
      - run: node scripts/check-skill-descriptions.mjs
